<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusFlow – Pomodoro & Tasks</title>
    <meta
      name="description"
      content="Beautiful Pomodoro timer with task list to help you focus and stay organized."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <span class="brand-dot"></span>
          <h1 class="brand-title">FocusFlow</h1>
        </div>
        <p class="app-subtitle">Pomodoro timer with tasks</p>
      </header>

      <main class="app-main">
        <section class="card timer-card" aria-label="Pomodoro timer">
          <h2 class="timer-title">Timer</h2>
          <div class="timer-layout">
            <div class="timer-main">
              <div class="timer-display" aria-live="polite">
                <span id="timer-minutes">25</span
                ><span class="timer-separator">:</span
                ><span id="timer-seconds">00</span>
              </div>

              <div class="timer-progress-wrapper" aria-hidden="true">
                <div class="timer-progress-bar">
                  <div class="timer-progress-fill" id="timer-progress"></div>
                </div>
              </div>

              <div class="timer-controls">
                <button id="timer-start-pause" class="primary-button">
                  Start
                </button>
                <button id="timer-reset" class="ghost-button">Reset</button>
              </div>
            </div>

            <div
              class="timer-modes timer-modes-vertical"
              role="tablist"
              aria-label="Timer mode"
            >
              <button
                class="mode-button is-active"
                data-mode="pomodoro"
                role="tab"
                aria-selected="true"
              >
                Pomodoro
              </button>
              <button
                class="mode-button"
                data-mode="short"
                role="tab"
                aria-selected="false"
              >
                Short break
              </button>
              <button
                class="mode-button"
                data-mode="long"
                role="tab"
                aria-selected="false"
              >
                Long break
              </button>
            </div>
          </div>

          <p class="timer-hint">
            Stay focused during Pomodoro sessions. Take short breaks between
            them and a long break after a few cycles.
          </p>
        </section>

        <section class="card tasks-card" aria-label="Task list">
          <header class="tasks-header">
            <div class="tasks-header-main">
              <h2>Tasks</h2>
              <span class="tasks-counter" id="tasks-counter">No tasks yet</span>
            </div>
            <form id="task-form" class="task-form task-form-inline" autocomplete="off">
              <label class="sr-only" for="task-input">Add a new task</label>
              <input
                id="task-input"
                class="task-input"
                type="text"
                name="task"
                placeholder="What do you want?"
                maxlength="120"
                required
              />
              <button
                type="submit"
                class="primary-button task-add-button task-add-inline"
                aria-label="Add task"
              >
                +
              </button>
            </form>
          </header>

          <ul id="task-list" class="task-list"></ul>

          <div class="tasks-footer">
            <button id="clear-completed" class="ghost-button small">
              Clear completed
            </button>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <span>Built with the Pomodoro technique in mind.</span>
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
